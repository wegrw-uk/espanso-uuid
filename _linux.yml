matches:
    - trigger: ":uuid7"
      replace: "{{output}}"
      vars:
          - name: output
            type: script
            params:
                args:
                    - "bin/uuid-linux"
                    - "7"

    - trigger: ":uuid4"
      replace: "{{output}}"
      vars:
          - name: output
            type: script
            params:
                args:
                    - "bin/uuid-linux"
                    - "4"