filter_os: macos

matches:
    - trigger: ":uuid7"
      replace: "{{output}}"
      vars:
          - name: output
            type: script
            params:
                args:
                    - "%CONFIG%/packages/espanso-uuid/bin/uuid-macos"
                    - "7"

    - trigger: ":uuid4"
      replace: "{{output}}"
      vars:
          - name: output
            type: script
            params:
                args:
                    - "%CONFIG%/packages/espanso-uuid/bin/uuid-macos"
                    - "4"
