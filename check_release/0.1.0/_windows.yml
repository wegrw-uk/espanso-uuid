filter_os: windows

matches:
  - trigger: ":uuid7"
    replace: "{{output}}"
    vars:
      - name: output
        type: script
        params:
          args:
            - "%CONFIG%/packages/espanso-uuid/0.1.0/bin/uuid-windows.exe"
            - "7"

  - trigger: ":uuid4"
    replace: "{{output}}"
    vars:
      - name: output
        type: script
        params:
          args:
            - "%CONFIG%/packages/espanso-uuid/0.1.0/bin/uuid-windows.exe"
            - "4"
