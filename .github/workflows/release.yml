name: Release

on:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main]

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      binary: espanso-uuid-rs
                      artifact: uuid-linux
                    - os: macos-latest
                      binary: espanso-uuid-rs
                      artifact: uuid-macos
                    - os: windows-latest
                      binary: espanso-uuid-rs.exe
                      artifact: uuid-windows

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: uuid_rs -> target

            - name: Build release binary
              run: cargo build --release --manifest-path uuid_rs/Cargo.toml

            - name: Upload binary
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: uuid_rs/target/release/${{ matrix.binary }}
                  retention-days: 1

    package:
        name: Package
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download all binaries
              uses: actions/download-artifact@v4
              with:
                  path: _binaries

            - name: Assemble packages
              run: |
                  set -euo pipefail
                  # Prepare binaries for the script
                  mkdir -p uuid_rs/target/x86_64-unknown-linux-gnu/release
                  mkdir -p uuid_rs/target/x86_64-apple-darwin/release
                  mkdir -p uuid_rs/target/x86_64-pc-windows-gnu/release

                  cp _binaries/uuid-linux/espanso-uuid-rs       uuid_rs/target/x86_64-unknown-linux-gnu/release/espanso-uuid-rs
                  cp _binaries/uuid-macos/espanso-uuid-rs       uuid_rs/target/x86_64-apple-darwin/release/espanso-uuid-rs
                  cp _binaries/uuid-windows/espanso-uuid-rs.exe  uuid_rs/target/x86_64-pc-windows-gnu/release/espanso-uuid-rs.exe

                  # Run the build script
                  ./scripts/build_espanso_package.sh --allow-partial

                  VERSION="$(awk '/^version:/ { print $2; exit }' _manifest.yml)"
                  echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

                  # Calculate Hub SHA
                  HUB_ARCHIVE="dist/espanso-uuid/espanso-uuid-hub-${VERSION}.tar.gz"
                  HUB_SHA="$(sha256sum "$HUB_ARCHIVE" | awk '{ print $1 }')"

                  # Generate Hub Metadata
                  cat <<EOF > hub_metadata.yml
    - name: espanso-uuid
      version: "$VERSION"
      title: "$(awk -F': ' '/^title:/ { print $2 }' _manifest.yml)"
      description: "$(awk -F': ' '/^description:/ { print $2 }' _manifest.yml)"
      author: "$(awk -F': ' '/^author:/ { print $2 }' _manifest.yml)"
      tags:
    $(grep -A 10 "tags:" _manifest.yml | grep "^  -" | sed 's/^/    /')
      homepage: "$(awk -F': ' '/^homepage:/ { print $2 }' _manifest.yml)"
      archive_url: "https://github.com/wegrw-uk/espanso-uuid/releases/download/v${VERSION}/espanso-uuid-hub-${VERSION}.tar.gz"
      archive_sha256: "$HUB_SHA"
    EOF
                  echo "=== HUB PR METADATA ==="
                  cat hub_metadata.yml

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: espanso-uuid-dist
                  path: |
                      dist/espanso-uuid/*.tar.gz
                      dist/espanso-uuid/*.zip
                      hub_metadata.yml

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/espanso-uuid/espanso-uuid-hub-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-${{ env.PACKAGE_VERSION }}.zip
                      dist/espanso-uuid/espanso-uuid-linux-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-macos-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-windows-${{ env.PACKAGE_VERSION }}.zip
                  generate_release_notes: true
                  body: |
                    ### Installation

                    **Via Espanso Hub (Coming soon)**
                    ```bash
                    espanso install espanso-uuid
                    ```

                    **Direct Git Install (External)**
                    ```bash
                    espanso install espanso-uuid --git https://github.com/wegrw-uk/espanso-uuid --external
                    ```

                    **Manual Install**
                    Download the archive for your platform below and extract it to your espanso packages folder.

                    ---
                    #### Hub PR Metadata
                    ```yaml
                    $(cat hub_metadata.yml)
                    ```
