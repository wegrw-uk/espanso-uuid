name: Release

on:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main]

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      binary: espanso-uuid-rs
                      artifact: uuid-linux
                    - os: macos-latest
                      binary: espanso-uuid-rs
                      artifact: uuid-macos
                    - os: windows-latest
                      binary: espanso-uuid-rs.exe
                      artifact: uuid-windows

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: uuid_rs -> target

            - name: Build release binary
              run: cargo build --release --manifest-path uuid_rs/Cargo.toml

            - name: Upload binary
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: uuid_rs/target/release/${{ matrix.binary }}
                  retention-days: 1

    package:
        name: Package
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download all binaries
              uses: actions/download-artifact@v4
              with:
                  path: _binaries

            - name: Assemble packages
              run: |
                  set -euo pipefail
                  # Prepare binaries for the script
                  mkdir -p uuid_rs/target/x86_64-unknown-linux-gnu/release
                  mkdir -p uuid_rs/target/x86_64-apple-darwin/release
                  mkdir -p uuid_rs/target/x86_64-pc-windows-gnu/release

                  cp _binaries/uuid-linux/espanso-uuid-rs       uuid_rs/target/x86_64-unknown-linux-gnu/release/espanso-uuid-rs
                  cp _binaries/uuid-macos/espanso-uuid-rs       uuid_rs/target/x86_64-apple-darwin/release/espanso-uuid-rs
                  cp _binaries/uuid-windows/espanso-uuid-rs.exe  uuid_rs/target/x86_64-pc-windows-gnu/release/espanso-uuid-rs.exe

                  # Run the build script
                  ./scripts/build_espanso_package.sh --allow-partial --skip-build

                  VERSION="$(awk '/^version:/ { print $2; exit }' _manifest.yml)"
                  echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

                  # Calculate Hub SHA
                  HUB_ARCHIVE="dist/espanso-uuid/espanso-uuid-hub-${VERSION}.tar.gz"
                  HUB_SHA="$(sha256sum "$HUB_ARCHIVE" | awk '{ print $1 }')"

                  # Generate Hub Metadata
                  echo "    - name: espanso-uuid" > hub_metadata.yml
                  echo "      version: \"$VERSION\"" >> hub_metadata.yml
                  echo "      title: \"$(awk -F': ' '/^title:/ { print $2 }' _manifest.yml)\"" >> hub_metadata.yml
                  echo "      description: \"$(awk -F': ' '/^description:/ { print $2 }' _manifest.yml)\"" >> hub_metadata.yml
                  echo "      author: \"$(awk -F': ' '/^author:/ { print $2 }' _manifest.yml)\"" >> hub_metadata.yml
                  echo "      tags:" >> hub_metadata.yml
                  grep -A 10 "tags:" _manifest.yml | grep "^[[:space:]]*-" | sed 's/^[[:space:]]*/    /' >> hub_metadata.yml
                  echo "      homepage: \"$(awk -F': ' '/^homepage:/ { print $2 }' _manifest.yml)\"" >> hub_metadata.yml
                  echo "      archive_url: \"https://github.com/wegrw-uk/espanso-uuid/releases/download/v${VERSION}/espanso-uuid-hub-${VERSION}.tar.gz\"" >> hub_metadata.yml
                  echo "      archive_sha256: \"$HUB_SHA\"" >> hub_metadata.yml

                  echo "=== HUB PR METADATA ==="
                  cat hub_metadata.yml

                  # Generate Release Body
                  echo "### Installation" > release_body.md
                  echo "" >> release_body.md
                  echo "#### 1. Via Espanso Hub (Recommended)" >> release_body.md
                  echo "Once accepted into the Hub, you can install with:" >> release_body.md
                  echo "\`\`\`bash" >> release_body.md
                  echo "espanso install espanso-uuid" >> release_body.md
                  echo "\`\`\`" >> release_body.md
                  echo "" >> release_body.md
                  echo "#### 2. Direct Install (External Archive)" >> release_body.md
                  echo "Install directly from this release without waiting for the Hub:" >> release_body.md
                  echo "\`\`\`bash" >> release_body.md
                  echo "espanso install espanso-uuid --url https://github.com/wegrw-uk/espanso-uuid/releases/download/v${VERSION}/espanso-uuid-${VERSION}.tar.gz --external" >> release_body.md
                  echo "\`\`\`" >> release_body.md
                  echo "" >> release_body.md
                  echo "---" >> release_body.md
                  echo "#### Hub PR Metadata" >> release_body.md
                  echo "This snippet is for contributing to [espanso/hub](https://github.com/espanso/hub)." >> release_body.md
                  echo "\`\`\`yaml" >> release_body.md
                  cat hub_metadata.yml >> release_body.md
                  echo "\`\`\`" >> release_body.md

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: espanso-uuid-dist
                  path: |
                      dist/espanso-uuid/*.tar.gz
                      dist/espanso-uuid/*.zip
                      hub_metadata.yml

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/espanso-uuid/espanso-uuid-hub-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-${{ env.PACKAGE_VERSION }}.zip
                      dist/espanso-uuid/espanso-uuid-linux-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-macos-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-windows-${{ env.PACKAGE_VERSION }}.zip
                  generate_release_notes: true
                  body_path: release_body.md
