name: Release

on:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main]

permissions:
    contents: write

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      binary: espanso-uuid-rs
                      artifact: uuid-linux
                    - os: macos-latest
                      binary: espanso-uuid-rs
                      artifact: uuid-macos
                    - os: windows-latest
                      binary: espanso-uuid-rs.exe
                      artifact: uuid-windows

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: uuid_rs -> target

            - name: Build release binary
              run: cargo build --release --manifest-path uuid_rs/Cargo.toml

            - name: Upload binary
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: uuid_rs/target/release/${{ matrix.binary }}
                  retention-days: 1

    package:
        name: Package
        needs: build
        runs-on: ubuntu-latest
        if: github.event_name == 'push'

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download all binaries
              uses: actions/download-artifact@v4
              with:
                  path: _binaries

            - name: Assemble packages and metadata
              run: |
                  set -euo pipefail

                  # 1. Prepare binaries for the build script
                  mkdir -p uuid_rs/target/x86_64-unknown-linux-gnu/release
                  mkdir -p uuid_rs/target/x86_64-apple-darwin/release
                  mkdir -p uuid_rs/target/x86_64-pc-windows-gnu/release

                  cp _binaries/uuid-linux/espanso-uuid-rs       uuid_rs/target/x86_64-unknown-linux-gnu/release/espanso-uuid-rs
                  cp _binaries/uuid-macos/espanso-uuid-rs       uuid_rs/target/x86_64-apple-darwin/release/espanso-uuid-rs
                  cp _binaries/uuid-windows/espanso-uuid-rs.exe  uuid_rs/target/x86_64-pc-windows-gnu/release/espanso-uuid-rs.exe

                  # 2. Update the repository 'bin/' directory for direct installation
                  mkdir -p bin
                  cp _binaries/uuid-linux/espanso-uuid-rs       bin/uuid-linux
                  cp _binaries/uuid-macos/espanso-uuid-rs       bin/uuid-macos
                  cp _binaries/uuid-windows/espanso-uuid-rs.exe  bin/uuid-windows.exe
                  chmod +x bin/uuid-linux bin/uuid-macos

                  # 3. Run the build script to create Hub archives
                  ./scripts/build_espanso_package.sh --allow-partial

                  VERSION="$(awk '/^version:/ { print $2; exit }' _manifest.yml)"
                  echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

                  # 4. Calculate Hub SHA
                  HUB_ARCHIVE="dist/espanso-uuid/espanso-uuid-hub-${VERSION}.tar.gz"
                  HUB_SHA="$(sha256sum "$HUB_ARCHIVE" | awk '{ print $1 }')"

                  # 5. Generate Hub Metadata (using printf to avoid heredoc issues)
                  printf -- "- name: espanso-uuid\n" > hub_metadata.yml
                  printf "  version: \"%s\"\n" "$VERSION" >> hub_metadata.yml
                  printf "  title: \"%s\"\n" "$(awk -F': ' '/^title:/ { print $2 }' _manifest.yml)" >> hub_metadata.yml
                  printf "  description: \"%s\"\n" "$(awk -F': ' '/^description:/ { print $2 }' _manifest.yml)" >> hub_metadata.yml
                  printf "  author: \"%s\"\n" "$(awk -F': ' '/^author:/ { print $2 }' _manifest.yml)" >> hub_metadata.yml
                  printf "  tags:\n" >> hub_metadata.yml
                  grep -A 10 "tags:" _manifest.yml | grep "^  -" | sed 's/^/    /' >> hub_metadata.yml
                  printf "  homepage: \"%s\"\n" "$(awk -F': ' '/^homepage:/ { print $2 }' _manifest.yml)" >> hub_metadata.yml
                  printf "  archive_url: \"https://github.com/wegrw-uk/espanso-uuid/releases/download/v%s/espanso-uuid-hub-%s.tar.gz\"\n" "$VERSION" "$VERSION" >> hub_metadata.yml
                  printf "  archive_sha256: \"%s\"\n" "$HUB_SHA" >> hub_metadata.yml

                  # 6. Generate Release Body
                  echo "### Installation" > release_body.md
                  echo "" >> release_body.md
                  echo "**Via Espanso Hub (Coming soon)**" >> release_body.md
                  echo '```bash' >> release_body.md
                  echo "espanso install espanso-uuid" >> release_body.md
                  echo '```' >> release_body.md
                  echo "" >> release_body.md
                  echo "**Direct Git Install (External)**" >> release_body.md
                  echo '```bash' >> release_body.md
                  echo "espanso install espanso-uuid --git https://github.com/wegrw-uk/espanso-uuid --external" >> release_body.md
                  echo '```' >> release_body.md
                  echo "" >> release_body.md
                  echo "**Manual Install**" >> release_body.md
                  echo "Download the archive for your platform below." >> release_body.md
                  echo "" >> release_body.md
                  echo "---" >> release_body.md
                  echo "#### Hub PR Metadata" >> release_body.md
                  echo '```yaml' >> release_body.md
                  cat hub_metadata.yml >> release_body.md
                  echo '```' >> release_body.md

            - name: Commit and push binaries
              if: github.ref == 'refs/heads/main'
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add bin/uuid-linux bin/uuid-macos bin/uuid-windows.exe
                  if git commit -m "chore: update binaries for v${{ env.PACKAGE_VERSION }} [skip ci]"; then
                    git push origin main
                  else
                    echo "No changes to commit"
                  fi

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: espanso-uuid-dist
                  path: |
                      dist/espanso-uuid/*.tar.gz
                      dist/espanso-uuid/*.zip
                      hub_metadata.yml

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      dist/espanso-uuid/espanso-uuid-hub-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-${{ env.PACKAGE_VERSION }}.zip
                      dist/espanso-uuid/espanso-uuid-linux-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-macos-${{ env.PACKAGE_VERSION }}.tar.gz
                      dist/espanso-uuid/espanso-uuid-windows-${{ env.PACKAGE_VERSION }}.zip
                  generate_release_notes: true
                  body_path: release_body.md
